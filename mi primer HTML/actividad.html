<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formularios</title>
    <style>
        table, td, th {
            border: 2px dashed rgb(255, 0, 0);   /* borde con guiones */
            border-collapse: collapse;
            padding: 5px;
        }
    </style>
</head>
<body>
    <table style="width:400px">
        <thead>
            <tr>
                <th>ESTUDIANTES</th>
                <th>NOTA 1</th>
                <th>NOTA 2</th>
                <th>NOTA Final</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Juan</td>
                <td>60</td>
                <td>80</td>
                <td>70</td>
            </tr>
            <tr>
                <td>María</td>
                <td>90</td>
                <td>85</td>
                <td>87.5</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4" style="text-align:center;">Total es de 450$</td>
            </tr>
        </tfoot>
    </table>
    <form action="/formulario" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="escribir nombre"br><br>
        <label for="comentario">Comentario:</label><br>
        <textarea cols="40" rows="10" id="comentario" placeholder="escriba su comentario aqui"></textarea><br><br>
       <button type="submit">guardar</button>
    </form>
    <hr>
    <form action="#" method="post">
    
    <label for="nombre">Nombre:</label><br>
    <input type="text" id="nombre" name="nombre" placeholder="escriba el nombre"><br><br>

    
    <label for="edad">Edad:</label><br>
    <input type="number" id="edad" name="edad" min="1" placeholder="escriba la edad"><br><br>

    
    <label for="correo">Correo electrónico:</label><br>
    <input type="email" id="correo" name="correo" placeholder="escriba el correo"><br><br>

    
    <label for="recomendacion">Recomendación:</label><br>
    <textarea id="recomendacion" name="recomendacion" rows="10" cols="40" placeholder="escriba su recomendación"></textarea><br><br>

    <button type="submit">enviar</button>
  </form>


</body>
</html>
